<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tổng quan sản xuất</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    :root{--bg:#0b1220;--panel:#111a2e;--panel2:#0e1626;--line:#1e293b;--txt:#e2e8f0;--mut:#94a3b8;--low:#64748b;
          --cmm:#38bdf8;--mt:#34d399;--rose:#f87171;--amber:#fbbf24;}
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{min-height:100%;}
    body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',Roboto,Arial,sans-serif;padding:2vh 2vw;}
    .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.6vh;flex-wrap:wrap;gap:8px;}
    .head h1{font-size:clamp(20px,2.4vw,38px);font-weight:800;letter-spacing:.01em;}
    .head .date{color:var(--amber);font-weight:800;}
    .head .meta{color:var(--low);font-size:clamp(11px,1vw,15px);}
    .datepick{display:inline-flex;align-items:center;gap:6px;color:var(--mut);font-size:13px;font-weight:600;}
    .datepick input[type=date]{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:4px 8px;font-size:13px;color-scheme:dark;}
    .datepick button{background:var(--panel2);color:var(--amber);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;}
    .langtog{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
    .langtog button{background:var(--panel2);color:var(--mut);border:none;padding:5px 12px;font-size:13px;font-weight:700;cursor:pointer;}
    .langtog button.on{background:var(--amber);color:#0b1220;}
    .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:1vw;margin-bottom:1.8vh;}
    .kpi{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:1.2vh 1vw;}
    .kpi .lbl{color:#cbd5e1;font-size:clamp(11px,1vw,15px);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .kpi .val{font-size:clamp(24px,2.9vw,48px);font-weight:800;line-height:1.05;}
    .kpi .val span{font-size:.4em;font-weight:700;}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:1.6vw;}
    .col{display:flex;flex-direction:column;gap:1.6vh;}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:1.6vh 1.2vw;display:flex;flex-direction:column;}
    .ptitle{display:flex;align-items:center;gap:10px;font-size:clamp(15px,1.6vw,26px);font-weight:800;margin-bottom:1vh;}
    .ptitle .sub{color:var(--low);font-size:.55em;font-weight:600;margin-left:auto;}
    .dot{width:14px;height:14px;border-radius:50%;}
    .chart{width:100%;height:31vh;min-height:230px;}
    .lst{overflow:auto;max-height:34vh;}
    .lst h3{color:var(--mut);font-size:clamp(11px,1vw,15px);text-transform:uppercase;letter-spacing:.05em;margin:1vh 0 .5vh;}
    table{width:100%;border-collapse:collapse;font-size:clamp(13px,1.1vw,19px);}
    td{padding:.6vh .4vw;border-top:1px solid var(--line);}
    td.r{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;}
    .rank{color:var(--low);width:2ch;}
    .msg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--mut);text-align:center;padding:24px;}
    @media(max-width:900px){
      body{padding:10px;}
      .kpis{grid-template-columns:repeat(3,1fr);gap:8px;}
      .cols{grid-template-columns:1fr;gap:12px;}
      .head{margin-bottom:10px;}
    }
    @media(max-width:560px){
      body{padding:8px;}
      .head h1{font-size:20px;}
      .kpis{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
      .kpi{padding:10px 12px;}
      .kpi .lbl{font-size:11px;}
      .kpi .val{font-size:30px;}
      .panel{padding:12px 10px;border-radius:14px;}
      .ptitle{font-size:16px;}
      .ptitle .sub{font-size:11px;}
      .chart{height:300px;min-height:300px;}
    }
  </style>
</head>
<body>
  <div id="root"><div class="msg">Đang tải…</div></div>
  <script>
    const KEY = new URLSearchParams(location.search).get("key") || "";
    const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const AX = "#475569", TXT = "#f1f5f9", GRID = "#1e293b";
    let charts = [], lastData = null;

    // ── i18n ──
    const T = {
      vi: {
        title:"Kết quả kiểm tra", updated:"Cập nhật", refresh:"tự làm mới mỗi 60 phút",
        k_mt_ring:"Auto MT · Ring", k_mt_hours:"Auto MT · Giờ quy đổi", k_mt_people:"Auto MT · Người",
        k_cmm_hours:"CMM · Giờ", k_cmm_steps:"CMM · Ring/bước", k_cmm_parts:"CMM · Part",
        t_mt_person:"Auto MT — Theo người (hôm qua)", t_mt_weekly:"Auto MT — Output 5 tuần gần nhất",
        t_cmm_part:"CMM — Chi tiết theo bước (hôm qua)", t_cmm_weekly:"CMM — Giờ 5 tuần gần nhất",
        people:"người", total:"Tổng", ringsSteps:"ring/bước", pickDate:"Ngày:", resetDay:"Hôm qua",
        lg_qty:"Số lượng", lg_eff:"Hiệu suất", lg_output:"Output", lg_hours:"Giờ", lg_avg:"Avg (4 tuần đã xong)", avg:"Avg",
        loading:"Đang tải…", missingKey:"Thiếu key. Mở bằng link kèm ?key=…", badKey:"Key không đúng.", loadErr:"Không tải được dữ liệu: ",
      },
      en: {
        title:"Inspection Results", updated:"Updated", refresh:"auto-refresh every 60 min",
        k_mt_ring:"Auto MT · Rings", k_mt_hours:"Auto MT · Earned hours", k_mt_people:"Auto MT · People",
        k_cmm_hours:"CMM · Hours", k_cmm_steps:"CMM · Rings/steps", k_cmm_parts:"CMM · Parts",
        t_mt_person:"Auto MT — By person (yesterday)", t_mt_weekly:"Auto MT — Output, last 5 weeks",
        t_cmm_part:"CMM — By step (yesterday)", t_cmm_weekly:"CMM — Hours, last 5 weeks",
        people:"people", total:"Total", ringsSteps:"rings/steps", pickDate:"Date:", resetDay:"Yesterday",
        lg_qty:"Qty", lg_eff:"Efficiency", lg_output:"Output", lg_hours:"Hours", lg_avg:"Avg (4 completed weeks)", avg:"Avg",
        loading:"Loading…", missingKey:"Missing key. Open with ?key=… in the URL", badKey:"Invalid key.", loadErr:"Failed to load data: ",
      },
    };
    // Nhúng trong hub (iframe) → theo ngôn ngữ của hub (localStorage 'cmm_lang') và ẩn nút riêng.
    const EMBEDDED = (window.self !== window.top);
    const readLang = () => ((localStorage.getItem(EMBEDDED ? "cmm_lang" : "tv_lang") === "en") ? "en" : "vi");
    let lang = readLang();
    const t = k => (T[lang][k] ?? k);
    const num = n => (Math.round((Number(n)||0)*10)/10).toLocaleString(lang === "en" ? "en-US" : "vi-VN");

    function rows(arr, valKey, unit){
      if(!arr || !arr.length) return '<tr><td style="color:var(--low)">Không có dữ liệu</td></tr>';
      return arr.map((x,i)=>`<tr><td class="rank">${i+1}</td><td>${esc(x.part||x.name)}</td><td class="r">${num(x[valKey])}${unit||""}</td></tr>`).join("");
    }

    let MOBILE = false;
    function baseAxis(cat){
      return {
        grid:{left:MOBILE?38:44,right:MOBILE?16:52,top:MOBILE?84:44,bottom:MOBILE?58:66},
        legend:{textStyle:{color:TXT,fontSize:MOBILE?12:16,fontWeight:600},top:4,padding:[0,8]},
        tooltip:{trigger:"axis"},
        xAxis:{type:"category",data:cat,axisLine:{lineStyle:{color:AX}},axisLabel:{color:TXT,rotate:(MOBILE||cat.length>7)?32:0,interval:0,fontSize:MOBILE?12:16,fontWeight:600}},
      };
    }
    const yAxisLbl = () => ({color:TXT,fontSize:MOBILE?11:15,fontWeight:600});
    const barLbl = (extra)=>({show:true,fontSize:MOBILE?12:17,fontWeight:800,...(extra||{})});

    function drawPerson(el, list){
      const c = echarts.init(el); charts.push(c);
      const names = list.map(x=>x.name), qty = list.map(x=>x.qty);
      const opt = baseAxis(names);
      opt.legend = { show:false }; // chỉ còn Qty, không cần chú thích
      c.setOption({...opt,
        yAxis:{type:"value",name:"Qty",nameTextStyle:yAxisLbl(),axisLabel:yAxisLbl(),splitLine:{lineStyle:{color:GRID}}},
        series:[
          {name:t("lg_qty"),type:"bar",data:qty,barMaxWidth:46,itemStyle:{color:"#34d399",borderRadius:[4,4,0,0]},label:barLbl({position:"top",color:TXT})}
        ]});
    }

    function drawWeekly(el, weekly, avg, o){
      o = o || {}; const unit = o.unit||"", barColor = o.color||"#22c55e", name = o.name||"Output";
      const c = echarts.init(el); charts.push(c);
      const cat = weekly.map(x=>x.week), qty = weekly.map(x=>x.qty);
      // Đường Avg chỉ vẽ qua các tuần ĐÃ XONG (bỏ tuần cuối = tuần hiện tại)
      const done = Math.max(0, weekly.length - 1);
      const avgData = weekly.map((_,i)=> i < done ? avg : null);
      const avgName = t("lg_avg") + ": " + num(avg) + unit; // giá trị hiện ở chú thích, không đè lên cột
      c.setOption({...baseAxis(cat),
        yAxis:{type:"value",axisLabel:yAxisLbl(),splitLine:{lineStyle:{color:GRID}}},
        series:[
          {name:name,type:"bar",data:qty,barMaxWidth:70,itemStyle:{color:barColor,borderRadius:[4,4,0,0]},label:barLbl({position:"top",color:TXT,formatter:p=>num(p.value)+unit})},
          {name:avgName,type:"line",data:avgData,symbol:"none",connectNulls:false,itemStyle:{color:"#fbbf24"},lineStyle:{color:"#fbbf24",width:3,type:"dashed"}}
        ]});
    }

    function drawBars(el, list, o){
      o = o || {}; const unit = o.unit||"", barColor = o.color||"#38bdf8";
      const c = echarts.init(el); charts.push(c);
      const names = list.map(x=>x.part||x.name), val = list.map(x=>x.hours!=null?x.hours:x.qty);
      const opt = baseAxis(names);
      if (o.multiline) {
        if (MOBILE) {
          // Mobile: xoay nghiêng 1 dòng "Part — Bước ×n" để không đè nhau
          opt.grid = {...opt.grid, left:38, right:16, bottom:150};
          opt.xAxis.axisLabel = {
            color:TXT, interval:0, rotate:38, fontSize:11, fontWeight:600, margin:10,
            formatter: v => String(v).replace(/\n/g, " — ")
          };
        } else {
          // Desktop: nhãn 2 dòng — dòng 1 tên part (đậm, tự xuống dòng), dòng 2 bước ×số lượng
          opt.grid = {...opt.grid, left:44, right:24, bottom:96};
          opt.xAxis.axisLabel = {
            color:TXT, interval:0, rotate:0, margin:12, lineHeight:16,
            formatter: v => {
              const parts = String(v).split("\n");
              return `{p|${parts[0]||""}}\n{s|${parts[1]||""}}`;
            },
            rich: {
              p:{ color:"#e2e8f0", fontSize:14, fontWeight:700, width:150, overflow:"break", lineHeight:15, align:"center" },
              s:{ color:"#94a3b8", fontSize:13, fontWeight:600, lineHeight:15, align:"center" }
            }
          };
        }
      }
      c.setOption({...opt,
        yAxis:{type:"value",axisLabel:yAxisLbl(),splitLine:{lineStyle:{color:GRID}}},
        series:[
          {type:"bar",data:val,barMaxWidth:52,itemStyle:{color:barColor,borderRadius:[4,4,0,0]},label:barLbl({position:"top",color:TXT,formatter:p=>num(p.value)+unit})}
        ]});
    }

    function render(d){
      MOBILE = window.innerWidth < 560;
      const root = document.getElementById("root");
      const mt = d.mt||{}, cmm = d.cmm||{};
      const loc = lang === "en" ? "en-US" : "vi-VN";
      const personSub = (mt.byPersonDay&&mt.byPersonDay.length) ? `${d.date} · ${mt.people||0} ${t("people")}` : "";
      const maxDate = yesterdayISO();
      root.innerHTML = `
        <div class="head">
          <h1>${t("title")} — <span class="date">${esc(d.date)}</span></h1>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <div class="datepick">
              <span>${t("pickDate")}</span>
              <input type="date" id="dateInput" value="${esc(d.date)}" max="${maxDate}" />
              ${selectedDate ? `<button id="resetDay">${t("resetDay")}</button>` : ``}
            </div>
            <div class="meta">${t("updated")}: ${new Date(d.refreshedAt).toLocaleString(loc)} · ${t("refresh")}</div>
            ${EMBEDDED ? `` : `<div class="langtog">
              <button data-l="vi" class="${lang==='vi'?'on':''}">VN</button>
              <button data-l="en" class="${lang==='en'?'on':''}">EN</button>
            </div>`}
          </div>
        </div>
        <div class="kpis">
          <div class="kpi"><div class="lbl">${t("k_mt_ring")}</div><div class="val" style="color:var(--mt)">${num(mt.qty)}</div></div>
          <div class="kpi"><div class="lbl">${t("k_mt_hours")}</div><div class="val" style="color:var(--mt)">${num(mt.hours)}<span>h</span></div></div>
          <div class="kpi"><div class="lbl">${t("k_mt_people")}</div><div class="val" style="color:var(--mt)">${num(mt.people)}</div></div>
          <div class="kpi"><div class="lbl">${t("k_cmm_hours")}</div><div class="val" style="color:var(--cmm)">${num(cmm.hours)}<span>h</span></div></div>
          <div class="kpi"><div class="lbl">${t("k_cmm_steps")}</div><div class="val" style="color:var(--cmm)">${num(cmm.count)}</div></div>
          <div class="kpi"><div class="lbl">${t("k_cmm_parts")}</div><div class="val" style="color:var(--cmm)">${(cmm.parts||[]).length}</div></div>
        </div>
        <div class="cols">
          <div class="col">
            <div class="panel">
              <div class="ptitle"><span class="dot" style="background:var(--mt)"></span>${t("t_mt_person")}<span class="sub">${esc(personSub)}</span></div>
              <div class="chart" id="chartPerson"></div>
            </div>
            <div class="panel">
              <div class="ptitle"><span class="dot" style="background:var(--mt)"></span>${t("t_mt_weekly")}</div>
              <div class="chart" id="chartMtWeekly"></div>
            </div>
          </div>
          <div class="col">
            <div class="panel">
              <div class="ptitle"><span class="dot" style="background:var(--cmm)"></span>${t("t_cmm_part")}<span class="sub">${t("total")} ${num(cmm.hours)}h · ${num(cmm.count)} ${t("ringsSteps")}</span></div>
              <div class="chart" id="chartCmmPart"></div>
            </div>
            <div class="panel">
              <div class="ptitle"><span class="dot" style="background:var(--cmm)"></span>${t("t_cmm_weekly")}</div>
              <div class="chart" id="chartCmmWeekly"></div>
            </div>
          </div>
        </div>`;

      root.querySelectorAll(".langtog button").forEach(b => b.addEventListener("click", () => {
        lang = b.dataset.l; localStorage.setItem("tv_lang", lang);
        document.documentElement.lang = lang;
        if(lastData) render(lastData);
      }));
      const di = document.getElementById("dateInput");
      if(di) di.addEventListener("change", () => { if(di.value){ selectedDate = di.value; loadData(selectedDate); } });
      const rb = document.getElementById("resetDay");
      if(rb) rb.addEventListener("click", () => { selectedDate = null; loadData(); });

      // CMM By part: nhãn 2 dòng — dòng 1 tên part (luôn hiện), dòng 2 bước ×số lượng.
      const ps = cmm.partSteps || [];
      const cmmDetail = ps.length
        ? ps.slice(0,12).map(p => ({ name: p.part + "\n" + p.step + (p.sets ? ` ×${p.sets}` : ""), hours: p.hours }))
        : (cmm.parts||[]).slice(0,12).map(p => ({ name: p.part + "\n—", hours: p.hours }));

      charts.forEach(c=>c.dispose()); charts = [];
      drawPerson(document.getElementById("chartPerson"), mt.byPersonDay||[]);
      drawWeekly(document.getElementById("chartMtWeekly"), mt.weekly||[], mt.weeklyAvg||0, {unit:"",color:"#22c55e",name:t("lg_output")});
      drawBars(document.getElementById("chartCmmPart"), cmmDetail, {unit:"h",color:"#38bdf8",multiline:true});
      drawWeekly(document.getElementById("chartCmmWeekly"), cmm.weekly||[], cmm.weeklyAvg||0, {unit:"h",color:"#38bdf8",name:t("lg_hours")});
    }

    // Re-render (không fetch lại) khi xoay/đổi kích thước để cập nhật bố cục mobile
    let rzT; window.addEventListener("resize", ()=>{ clearTimeout(rzT); rzT = setTimeout(()=>{ if(lastData) render(lastData); }, 250); });

    let selectedDate = null; // null = mặc định (hôm qua)
    function yesterdayISO(){ const n = new Date(Date.now()+7*3600*1000); n.setUTCDate(n.getUTCDate()-1); return n.toISOString().slice(0,10); }

    async function loadData(dateArg){
      if(!KEY){ document.getElementById("root").innerHTML='<div class="msg">'+t("missingKey")+'</div>'; return; }
      try{
        const url = `/api/overview?key=${encodeURIComponent(KEY)}` + (dateArg ? `&date=${encodeURIComponent(dateArg)}` : "");
        const r = await fetch(url);
        if(r.status===401){ document.getElementById("root").innerHTML='<div class="msg">'+t("badKey")+'</div>'; return; }
        if(!r.ok) throw new Error("HTTP "+r.status);
        lastData = await r.json();
        render(lastData);
      }catch(e){ document.getElementById("root").innerHTML='<div class="msg">'+t("loadErr")+esc(e.message)+'</div>'; }
    }
    // Khi nhúng trong hub: đổi ngôn ngữ ở hub → cập nhật theo (storage event từ cửa sổ cha)
    window.addEventListener("storage", (e) => {
      if(EMBEDDED && e.key === "cmm_lang"){
        const nl = readLang();
        if(nl !== lang){ lang = nl; document.documentElement.lang = lang; if(lastData) render(lastData); }
      }
    });
    document.documentElement.lang = lang;
    loadData();
    // Mỗi 60 phút: quay về ngày mặc định (hôm qua)
    setInterval(() => { selectedDate = null; loadData(); }, 60*60*1000);
  </script>
</body>
</html>
