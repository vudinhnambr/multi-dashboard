<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Skill Level Program — Inspector Evaluation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
 --bg:#0f1720;--panel:#182430;--panel2:#1f2f3d;--line:#2b3d4d;--txt:#e7eef5;--mut:#8ba0b3;
 --acc:#3da5ff;--acc2:#26d0a5;--warn:#ffb347;--bad:#ff6b6b;
 --l1a:#7d8b96;--l1b:#6a97c9;--l1c:#4f8bd6;--l2a:#3ec9a7;--l2b:#2eb389;--l3:#f0b429;--l4:#f38b3c;--l5:#e5484d;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
header{background:linear-gradient(90deg,#12324f,#0f1720);padding:16px 24px;border-bottom:1px solid var(--line)}
header h1{margin:0;font-size:19px}
header .sub{color:var(--mut);font-size:12px;margin-top:3px}
nav{display:flex;gap:2px;background:var(--panel);padding:0 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;position:sticky;top:0;z-index:20}
nav button{background:none;border:none;color:var(--mut);padding:13px 18px;cursor:pointer;font-size:14px;border-bottom:3px solid transparent;font-weight:600}
nav button:hover{color:var(--txt)}
nav button.active{color:var(--acc);border-bottom-color:var(--acc)}
main{padding:22px;max-width:1280px;margin:0 auto}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:18px}
.card h2{margin:0 0 4px;font-size:16px}
.card h3{margin:16px 0 8px;font-size:14px;color:var(--acc)}
.muted{color:var(--mut)}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px}
.kpi .n{font-size:26px;font-weight:700}
.kpi .l{color:var(--mut);font-size:12px;margin-top:2px}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{border:1px solid var(--line);padding:7px 9px;text-align:left}
th{background:var(--panel2);color:var(--mut);font-weight:600;position:sticky;top:49px}
tr:hover td{background:#1b2a38}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700;color:#06121b;white-space:nowrap}
.pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:var(--panel2);border:1px solid var(--line);color:var(--mut)}
select,input[type=number],input[type=text]{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:8px 10px;font-size:13px}
input[type=number]{width:72px}
button.act{background:var(--acc);color:#04121f;border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer}
button.act:hover{filter:brightness(1.1)}
button.ghost{background:none;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 14px;cursor:pointer}
button.ghost:hover{border-color:var(--acc)}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.spread{justify-content:space-between}
.chartbox{position:relative;height:300px}
.chartbox.sm{height:240px}
.two{grid-template-columns:1fr 1fr}
.three{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.two,.three{grid-template-columns:1fr}}
.note{font-size:12px;color:var(--mut);background:var(--panel2);border-left:3px solid var(--acc);padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0}
.good{color:var(--acc2)}.up{color:var(--acc2)}.down{color:var(--bad)}
.bar{height:8px;border-radius:5px;background:var(--panel2);overflow:hidden}
.bar>i{display:block;height:100%;background:var(--acc)}
.tag{font-size:11px;padding:2px 7px;border-radius:5px;background:#20303f;color:var(--mut);margin-right:4px}
details summary{cursor:pointer;color:var(--acc);font-weight:600;padding:6px 0}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;margin-top:8px}
.legend span{display:flex;align-items:center;gap:5px}
.dot{width:12px;height:12px;border-radius:3px;display:inline-block}
.small{font-size:12px}
.hl{background:#243646}
.savebar{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--line);padding:12px 22px;display:none;align-items:center;justify-content:space-between;z-index:30}
.savebar.show{display:flex}
input.zero{border-color:var(--warn)!important;background:#3a2f1a!important;color:var(--warn)!important;box-shadow:0 0 0 1px var(--warn) inset}
/* Bảng xếp hạng có khung cuộn riêng → header dính ở đỉnh khung (không phải 49px như bảng khác) */
#drank th{top:0}
/* Sơ đồ tổ chức */
.org-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
@media(max-width:1100px){.org-wrap{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.org-wrap{grid-template-columns:1fr}}
.org-col{display:flex;flex-direction:column;gap:10px}
.org-leader{background:var(--panel2);border:1px solid var(--acc);border-radius:10px;padding:12px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.org-leader .org-lname{font-weight:700;margin-top:6px}
.org-lrole{color:var(--acc);font-size:12px;font-weight:600}
.org-ljoin{color:var(--mut);font-size:11px}
.org-ldesc{color:var(--mut);font-size:11px;margin-top:4px;line-height:1.35}
.org-group{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px}
.org-gtitle{font-weight:700;font-size:13px;margin-bottom:8px;color:var(--acc2)}
.org-people{display:flex;flex-direction:column;gap:8px}
.org-person{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px;cursor:pointer}
.org-person:hover{border-color:var(--acc)}
.org-pname{font-weight:600;font-size:13px}
.org-pjoin{color:var(--mut);font-size:11px}
</style>
</head>

<script>
/* ============ CONFIG ============ */
const CATS=[
 {key:"Measuring Equipment",vn:"Sử dụng thiết bị đo",short:"Đo lường",color:"#3da5ff"},
 {key:"Spec/Drawing Understanding",vn:"Hiểu tiêu chuẩn / bản vẽ",short:"Bản vẽ",color:"#26d0a5"},
 {key:"Report Writing",vn:"Khả năng viết báo cáo",short:"Báo cáo",color:"#f0b429"},
 {key:"Judgement",vn:"Phán định (Đạt/Không đạt)",short:"Phán định",color:"#f38b3c"},
 {key:"Work Attitude & Literacy",vn:"Thái độ & trình độ",short:"Thái độ",color:"#b98bff"},
];
const DEFAULT_WEIGHTS={"Measuring Equipment":30,"Spec/Drawing Understanding":20,"Report Writing":15,"Judgement":20,"Work Attitude & Literacy":15};
const DEFAULT_BANDS=[
 {name:"Level 1A",min:0},{name:"Level 1B",min:20},{name:"Level 1C",min:32},
 {name:"Level 2A",min:44},{name:"Level 2B",min:56},{name:"Level 3",min:68},
 {name:"Level 4",min:80},{name:"Level 5",min:90}];
const LVLCOLOR={"Level 1A":"#7d8b96","Level 1B":"#6a97c9","Level 1C":"#4f8bd6","Level 2A":"#3ec9a7","Level 2B":"#2eb389","Level 3":"#f0b429","Level 4":"#f38b3c","Level 5":"#e5484d"};
const BASELINE="2026-06";

/* ============ STATE / STORAGE ============ */
/* Lưu trữ CHUNG trên server (thay localStorage). window.IE_REMOTE được cổng đăng nhập nạp trước. */
function load(k,def){ const R=window.IE_REMOTE||{}; return (k in R && R[k]!=null)?R[k]:def; }
function save(k,v){ if(!window.IE_REMOTE)window.IE_REMOTE={}; window.IE_REMOTE[k]=v; if(window.IE_persist)window.IE_persist(k,v); }
let CONFIG={weights:{...DEFAULT_WEIGHTS},bands:JSON.parse(JSON.stringify(DEFAULT_BANDS)),leaders:{}};
let CUSTOM=[];
let MONTHS=null;
/* Nạp trạng thái từ server — gọi trong bootApp() sau khi đăng nhập + tải dữ liệu. */
function initState(){
 CONFIG=load("qsl_config",{weights:{...DEFAULT_WEIGHTS},bands:JSON.parse(JSON.stringify(DEFAULT_BANDS)),leaders:{}});
 CUSTOM=load("qsl_custom",[]);
 CUSTOM.forEach(p=>{if(!APPDATA.people.find(x=>x.name===p.name))APPDATA.people.push(p);});
 MONTHS=load("qsl_months",null);
 if(!MONTHS){
  MONTHS={}; MONTHS[BASELINE]={};
  APPDATA.people.forEach(p=>{MONTHS[BASELINE][p.name]={pct:{...p.basePct},note:""};});
  save("qsl_months",MONTHS);
 }
 // Dọn key tháng lỗi (vd '2026-06 (gốc)' sinh ra do bug option không có value) — chỉ giữ YYYY-MM
 { const valid={}; let changed=false;
   Object.keys(MONTHS).forEach(k=>{ if(/^\d{4}-\d{2}$/.test(k)) valid[k]=MONTHS[k]; else changed=true; });
   if(changed){ MONTHS=valid; save("qsl_months",MONTHS); }
 }
 window.__INACTIVE=load("qsl_inactive",[]);   // danh sách người đã nghỉ (không thống kê)
 window.__PHOTOS=load("qsl_photos",{});       // ảnh (base64) theo tên
 window.__CERTS=load("qsl_certs",{});         // chứng nhận theo tên (mảng {title,date,note})
 window.__META=load("qsl_meta",{});           // ghi đè Nhóm / Thâm niên / Công việc chính
 const META=window.__META||{};
 APPDATA.people.forEach(p=>{
  p.meta=p.meta||{};
  const o=META[p.name];
  if(o){
   if(o.group)p.group=o.group;
   if("entered" in o)p.meta.entered=o.entered;
   if("mainJob" in o)p.meta.mainJob=o.mainJob;
   if("id" in o)p.meta.id=o.id;
   if("fullName" in o)p.meta.fullName=o.fullName;
   if("service" in o && !("entered" in o))p.meta.service=o.service; // tương thích bản ghi cũ
  }
  // Thâm niên luôn tính lại từ ngày vào làm (nếu có)
  if(p.meta.entered){ const s=computeSeniority(p.meta.entered); if(s!=="-")p.meta.service=s; }
 });
}
function personByName(n){return APPDATA.people.find(p=>p.name===n);}
function monthList(){return Object.keys(MONTHS).sort();}
let latestMonthOverride=null;
function latestMonth(){return latestMonthOverride||monthList().slice(-1)[0];}
function getPct(month,name){
 if(MONTHS[month]&&MONTHS[month][name])return MONTHS[month][name].pct;
 return personByName(name).basePct;
}
function getNote(month,name){return (MONTHS[month]&&MONTHS[month][name])?(MONTHS[month][name].note||""):"";}

/* ============ COMPUTE ============ */
function composite(pct){
 const w=CONFIG.weights;let tot=0,sum=0;
 CATS.forEach(c=>{const wt=+w[c.key]||0;tot+=wt;sum+=(+pct[c.key]||0)*wt;});
 return tot?sum/tot:0;
}
function levelOf(comp){
 let lv=CONFIG.bands[0].name;
 CONFIG.bands.forEach(b=>{if(comp>=b.min)lv=b.name;});
 return lv;
}
function lvlBadge(lv){return `<span class="badge" style="background:${LVLCOLOR[lv]||'#888'}">${lv}</span>`;}
function fmt(x){return (Math.round(x*10)/10).toFixed(1);}

/* ============ NAV ============ */
const TABS=[
 {id:"dash",label:"📊 Tổng quan"},
 {id:"groups",label:"👥 Nhóm (7)"},
 {id:"monthly",label:"🗓️ Chấm điểm tháng"},
 {id:"person",label:"🔍 Phân tích cá nhân"},
 {id:"org",label:"🏢 Sơ đồ tổ chức"},
 {id:"level",label:"⚙️ Cấu trúc Level"},
];
let current="dash";
function renderNav(){
 document.getElementById("nav").innerHTML=TABS.map(t=>`<button class="${t.id===current?'active':''}" onclick="go('${t.id}')">${t.label}</button>`).join("");
}
let dirtyMonth=null;
function go(id){ if(dirtyMonth){ if(!confirm("Bạn có thay đổi chưa lưu ở tháng "+dirtyMonth+". Rời đi và bỏ thay đổi?"))return; discardMonth(); }
 current=id;renderNav();render();window.scrollTo(0,0);}
function render(){({dash:vDash,groups:vGroups,monthly:vMonthly,person:vPerson,org:vOrg,level:vLevel}[current])();}

function monthRows(month){
 return APPDATA.people.map(p=>{
  const pct=getPct(month,p.name);const comp=composite(pct);
  return {name:p.name,id:(p.meta.id||""),group:p.group,job:(p.meta.mainJob||""),service:(p.meta.service||""),pct,comp,level:levelOf(comp),old:p.meta.oldFinalLevel,custom:!!p.custom,inactive:isInactive(p.name)};
 });
}
/* Chỉ những người ĐANG LÀM (bỏ người đã nghỉ) — dùng cho mọi thống kê. */
function statRows(month){return monthRows(month).filter(r=>!r.inactive);}
/* ===== Người đã nghỉ: giữ dữ liệu, không thống kê ===== */
function isInactive(n){return (window.__INACTIVE||[]).includes(n);}
function toggleInactive(n){
 let a=window.__INACTIVE||[];
 a=a.includes(n)?a.filter(x=>x!==n):[...a,n];
 window.__INACTIVE=a; save("qsl_inactive",a); render();
}

/* ============ DASHBOARD ============ */
let ch={};
function destroyCharts(){Object.values(ch).forEach(c=>{try{c.destroy()}catch(e){}});ch={};}
const barLabels={id:"barLabels",afterDatasetsDraw(chart){
 const ctx=chart.ctx;
 chart.data.datasets.forEach((ds,di)=>{
  const meta=chart.getDatasetMeta(di);
  meta.data.forEach((bar,i)=>{
   const v=ds.data[i];if(v===null||v===undefined||v===0)return;
   const txt=Number.isInteger(v)?String(v):(Math.round(v*10)/10).toFixed(1);
   ctx.save();ctx.fillStyle="#e7eef5";ctx.font="bold 11px 'Segoe UI',sans-serif";ctx.textAlign="center";ctx.textBaseline="bottom";
   ctx.fillText(txt,bar.x,bar.y-3);ctx.restore();
  });
 });
}};
function renderDashCharts(){
 const rows=window._dashRows||[];
 const lf=window._dashLevelFilter||"";
 const gf=document.getElementById("dgfilter")?.value||"";
 const order=DEFAULT_BANDS.map(b=>b.name);
 const groups=APPDATA.groups;
 // Distribution chart: respects the active GROUP filter
 const distRows=gf?rows.filter(r=>r.group===gf):rows;
 const dist={};order.forEach(l=>dist[l]=0);distRows.forEach(r=>dist[r.level]++);
 // Group chart: if a LEVEL is selected -> count people per group in that level; else -> avg composite
 let gData,gTitle,gColor;
 if(lf){gData=groups.map(g=>rows.filter(r=>r.group===g&&r.level===lf).length);gTitle="Số người ở "+lf;gColor=groups.map(_=>LVLCOLOR[lf]);}
 else{gData=groups.map(g=>{const a=rows.filter(r=>r.group===g);return a.length?a.reduce((s,r)=>s+r.comp,0)/a.length:0;});gTitle="Điểm TB";gColor="#3da5ff";}
 if(ch.dist){ch.dist.destroy();}if(ch.grp){ch.grp.destroy();}
 ch.dist=new Chart(cDist,{type:"bar",data:{labels:order,datasets:[{data:order.map(l=>dist[l]),backgroundColor:order.map(l=>LVLCOLOR[l]),borderWidth:order.map(l=>l===lf?2:0),borderColor:"#fff"}]},
   options:Object.assign(barOpt("Số người"+(gf?" — "+shortGroup(gf):""),true),{onClick:(e,els)=>{if(els.length){const lv=order[els[0].index];window._dashLevelFilter=(window._dashLevelFilter===lv)?"":lv;updateDash();scrollToRank();}}}),plugins:[barLabels]});
 ch.grp=new Chart(cGroup,{type:"bar",data:{labels:groups.map(shortGroup),datasets:[{data:gData,backgroundColor:gColor,borderWidth:groups.map(g=>g===gf?2:0),borderColor:"#fff"}]},
   options:Object.assign(barOpt(gTitle,!!lf),{onClick:(e,els)=>{if(els.length){const g=groups[els[0].index];const s=document.getElementById("dgfilter");if(s)s.value=(s.value===g?"":g);updateDash();scrollToRank();}}}),plugins:[barLabels]});
}
function updateDash(){renderDashCharts();dashFilter();}
function vDash(){
 const m=latestMonth();const rows=statRows(m);
 if(window._dashLevelFilter===undefined)window._dashLevelFilter="";
 const order=DEFAULT_BANDS.map(b=>b.name);
 const dist={};order.forEach(l=>dist[l]=0);rows.forEach(r=>dist[r.level]++);
 const byGroup={};APPDATA.groups.forEach(g=>byGroup[g]=rows.filter(r=>r.group===g));
 const avgComp=rows.reduce((a,r)=>a+r.comp,0)/rows.length;
 const el=document.getElementById("content");
 el.innerHTML=`
 <div class="card">
  <div class="row spread"><h2>Tổng quan — tháng <b>${m}</b></h2>
   <div class="row"><span class="muted small">Chọn tháng:</span><select id="dmonth" onchange="dashMonth(this.value)">${monthList().map(x=>`<option value="${x}" ${x===m?'selected':''}>${x}</option>`).join("")}</select></div></div>
  <div class="grid kpis" style="margin-top:12px">
   <div class="kpi"><div class="n">${rows.length}</div><div class="l">Tổng số Inspector</div></div>
   <div class="kpi"><div class="n">7</div><div class="l">Nhóm công việc</div></div>
   <div class="kpi"><div class="n">${fmt(avgComp)}</div><div class="l">Điểm tổng hợp TB (/100)</div></div>
   <div class="kpi"><div class="n">${rows.filter(r=>["Level 3","Level 4","Level 5"].includes(r.level)).length}</div><div class="l">Đạt Level 3 trở lên</div></div>
  </div>
 </div>
 <div class="grid two">
  <div class="card"><h2>Phân bố Level</h2><div class="chartbox sm"><canvas id="cDist"></canvas></div></div>
  <div class="card"><h2>Điểm tổng hợp trung bình theo nhóm</h2><div class="chartbox sm"><canvas id="cGroup"></canvas></div></div>
 </div>
 <div class="card">
  <div class="row spread"><h2>Bảng xếp hạng Inspector</h2>
   <div class="row small muted"><input type="text" id="dsearch" placeholder="Tìm tên..." oninput="dashFilter()" style="width:160px">
   <select id="dgfilter" onchange="updateDash()"><option value="">Tất cả nhóm</option>${APPDATA.groups.map(g=>`<option>${g}</option>`).join("")}</select></div></div>
  <p class="small muted" style="margin:8px 0 0">💡 Nhấn cột <b>Phân bố Level</b> → biểu đồ nhóm đổi sang "số người mỗi nhóm ở Level đó". Nhấn cột <b>Điểm TB theo nhóm</b> → biểu đồ Level đổi sang phân bố Level của riêng nhóm đó. Nhấn lại để bỏ lọc.</p>
  <div id="dfchip" style="margin-top:6px"></div>
  <div style="max-height:520px;overflow:auto;margin-top:10px"><table id="drank"></table></div>
  <div class="legend">${CATS.map(c=>`<span><i class="dot" style="background:${c.color}"></i>${c.short}</span>`).join("")}</div>
 </div>`;
 destroyCharts();
 window._dashRows=rows;
 renderDashCharts();
 dashFilter();
}
function shortGroup(g){return g.replace("Case Depth & Hardness","Case Depth").replace("Incoming & DT test & CAV","Incoming/DT").replace("After Treatment Final & Packing","Final/Packing");}
function barOpt(y,integer){return {responsive:true,maintainAspectRatio:false,layout:{padding:{top:22}},plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grace:"12%",ticks:Object.assign({color:"#8ba0b3",precision:0},integer?{stepSize:1}:{}),grid:{color:"#2b3d4d"},title:{display:true,text:y,color:"#8ba0b3"}},x:{ticks:{color:"#8ba0b3",font:{size:10}},grid:{display:false}}}};}
function dashMonth(m){vDashWith(m);}
function vDashWith(m){latestMonthOverride=m;vDash();latestMonthOverride=null;const s=document.getElementById("dmonth");if(s)s.value=m;}
function scrollToRank(){const el=document.getElementById("drank");if(el)window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-130,behavior:"smooth"});}
function clearLevelFilter(){window._dashLevelFilter="";updateDash();}
function clearGroupFilter(){const s=document.getElementById("dgfilter");if(s)s.value="";updateDash();}
function noAccent(s){return String(s||"").normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/đ/g,"d").replace(/Đ/g,"D").toLowerCase().trim();}
function dashFilter(){
 const q=noAccent(document.getElementById("dsearch")?.value||"");
 const gf=document.getElementById("dgfilter")?.value||"";
 const lf=window._dashLevelFilter||"";
 let rows=(window._dashRows||[]).filter(r=>(noAccent(r.name).includes(q)||noAccent(r.id).includes(q))&&(!gf||r.group===gf)&&(!lf||r.level===lf));
 rows=rows.slice().sort((a,b)=>b.comp-a.comp);
 const chip=document.getElementById("dfchip");
 if(chip){let c=[];
  if(lf)c.push(`<span class="pill" style="border-color:${LVLCOLOR[lf]};color:${LVLCOLOR[lf]}">Level: ${lf} <a href="#" onclick="clearLevelFilter();return false" style="color:inherit;text-decoration:none">✕</a></span>`);
  if(gf)c.push(`<span class="pill">Nhóm: ${shortGroup(gf)} <a href="#" onclick="clearGroupFilter();return false" style="color:var(--acc);text-decoration:none">✕</a></span>`);
  chip.innerHTML=c.length?('<span class="small muted">Đang lọc: </span>'+c.join(" ")+` <span class="small muted">— ${rows.length} người</span>`):"";}
 const t=document.getElementById("drank");
 t.innerHTML=`<tr><th>#</th><th>ID</th><th>Tên</th><th>Nhóm</th><th>Công việc</th><th>Đo lường</th><th>Bản vẽ</th><th>Báo cáo</th><th>Phán định</th><th>Thái độ</th><th>Tổng hợp</th><th>Level mới</th><th>Level cũ</th></tr>`+
  rows.map((r,i)=>`<tr>
   <td>${i+1}</td><td class="small muted">${escHtml(r.id||"-")}</td><td><a href="#" onclick="openPerson('${esc1(r.name)}');return false" style="color:var(--acc)">${escHtml(dispName(r.name))}</a></td>
   <td class="small">${shortGroup(r.group)}</td><td class="small muted">${r.job}</td>
   ${CATS.map(c=>`<td>${miniBar(r.pct[c.key],c.color)}</td>`).join("")}
   <td><b>${fmt(r.comp)}</b></td><td>${lvlBadge(r.level)}</td><td class="small muted">${r.old||"-"}</td></tr>`).join("");
}
function miniBar(v,color){v=+v||0;return `<div style="display:flex;align-items:center;gap:6px"><div class="bar" style="width:44px"><i style="width:${Math.min(v,100)}%;background:${color}"></i></div><span class="small muted">${Math.round(v)}</span></div>`;}
function openPerson(n){window._selPerson=n;go("person");}

/* ============ GROUPS ============ */
function vGroups(){
 const m=latestMonth();const rows=monthRows(m);
 const el=document.getElementById("content");
 let html=`<div class="card"><div class="row spread"><h2>7 nhóm công việc</h2><button class="act" onclick="toggleAddForm()">➕ Thêm Inspector</button></div>
  <p class="muted small">Mỗi nhóm do một Group Leader phụ trách chấm điểm hằng tháng. Nhấn tên để xem phân tích cá nhân. Bấm ✎ để đặt tên Group Leader.</p>
  <div id="addForm" style="display:none;margin-top:10px;padding:12px;background:var(--panel2);border:1px solid var(--line);border-radius:8px">
   <div class="row">
    <input type="text" id="niName" placeholder="Tên (VD: N.V An)" style="width:150px">
    <select id="niGroup">${APPDATA.groups.map(g=>`<option>${g}</option>`).join("")}</select>
    <input type="text" id="niJob" placeholder="Công việc chính" style="width:150px">
    <input type="text" id="niEntered" placeholder="Ngày vào (YYYY-MM-DD)" style="width:160px">
    <button class="act" onclick="addInspector()">Lưu</button>
    <button class="ghost" onclick="toggleAddForm()">Hủy</button>
   </div>
   <p class="small muted" style="margin:8px 0 0">Inspector mới bắt đầu ở 0 điểm. Vào tab <b>Chấm điểm tháng</b> để Group Leader nhập điểm.</p>
  </div></div>`;
 APPDATA.groups.forEach(g=>{
  const all=rows.filter(r=>r.group===g);
  const gr=all.filter(r=>!r.inactive).sort((a,b)=>b.comp-a.comp);
  const inact=all.filter(r=>r.inactive).sort((a,b)=>a.name.localeCompare(b.name));
  const ordered=[...gr,...inact];
  const avg=gr.length?gr.reduce((s,r)=>s+r.comp,0)/gr.length:0;
  const leader=CONFIG.leaders[g]||"(chưa đặt)";
  html+=`<div class="card">
   <div class="row spread"><h2>${g} <span class="pill">${gr.length} đang làm${inact.length?` · ${inact.length} nghỉ`:''}</span></h2>
    <div class="row small"><span class="muted">Group Leader:</span>
     <select onchange="setLeaderVal('${esc1(g)}',this.value)" style="min-width:150px">
      <option value="">(chưa đặt)</option>
      ${APPDATA.people.map(pp=>`<option value="${escHtml(pp.name)}" ${pp.name===(CONFIG.leaders[g]||'')?'selected':''}>${escHtml(pp.name)}</option>`).join("")}
     </select>
     <span class="muted" style="margin-left:10px">Điểm TB nhóm:</span> <b>${fmt(avg)}</b></div></div>
   <table style="margin-top:10px"><tr><th>Tên</th><th>Công việc chính</th><th>Thâm niên</th>
    ${CATS.map(c=>`<th class="small">${c.short}</th>`).join("")}<th>Tổng</th><th>Level</th><th class="small" title="Đánh dấu người đã nghỉ — giữ dữ liệu nhưng không tính thống kê">Đã nghỉ</th></tr>
   ${ordered.map(r=>`<tr style="${r.inactive?'opacity:.45':''}"><td><a href="#" onclick="openPerson('${esc1(r.name)}');return false" style="color:var(--acc)">${escHtml(dispName(r.name))}</a>${r.inactive?' <span class="tag">nghỉ</span>':''}${r.custom?` <a href="#" onclick="delInspector('${esc1(r.name)}');return false" title="Xóa Inspector" style="color:var(--bad);text-decoration:none">✕</a>`:''}</td>
     <td class="small muted">${r.job}</td><td class="small muted">${r.service}</td>
     ${CATS.map(c=>`<td>${miniBar(r.pct[c.key],c.color)}</td>`).join("")}
     <td><b>${fmt(r.comp)}</b></td><td>${lvlBadge(r.level)}</td>
     <td style="text-align:center"><input type="checkbox" ${r.inactive?'checked':''} title="Đánh dấu đã nghỉ" onclick="toggleInactive('${r.name.replace(/'/g,"\\'")}')"></td></tr>`).join("")}
   </table></div>`;
 });
 el.innerHTML=html;
}
function setLeader(g){const cur=CONFIG.leaders[g]||"";const v=prompt("Tên Group Leader cho nhóm: "+g,cur);if(v!==null){CONFIG.leaders[g]=v.trim();save("qsl_config",CONFIG);render();}}
function setLeaderVal(g,name){CONFIG.leaders[g]=name||"";save("qsl_config",CONFIG);render();}
function toggleAddForm(){const f=document.getElementById("addForm");if(f)f.style.display=(f.style.display==="none"?"block":"none");}
function addInspector(){
 const name=(document.getElementById("niName").value||"").trim();
 const group=document.getElementById("niGroup").value;
 const job=(document.getElementById("niJob").value||"").trim();
 const entered=(document.getElementById("niEntered").value||"").trim();
 if(!name){alert("Vui lòng nhập tên Inspector.");return;}
 if(APPDATA.people.find(p=>p.name===name)){alert("Tên này đã tồn tại.");return;}
 const scores={},basePct={};
 APPDATA.categories.forEach(c=>{scores[c.name]={};c.items.forEach(it=>scores[c.name][it]=0);basePct[c.name]=0;});
 const p={name,group,meta:{mainJob:job,entered,service:"",oldFinalLevel:""},scores,basePct,custom:true};
 APPDATA.people.push(p);
 const cust=load("qsl_custom",[]);cust.push(p);save("qsl_custom",cust);
 alert("Đã thêm "+name+" vào nhóm "+group+".\nVào tab 'Chấm điểm tháng' để nhập điểm.");
 vGroups();
}
function delInspector(name){
 if(!confirm("Xóa Inspector "+name+"? (Chỉ áp dụng cho người được thêm thủ công)"))return;
 APPDATA.people=APPDATA.people.filter(p=>p.name!==name);
 save("qsl_custom",load("qsl_custom",[]).filter(p=>p.name!==name));
 Object.keys(MONTHS).forEach(m=>{if(MONTHS[m])delete MONTHS[m][name];});save("qsl_months",MONTHS);
 vGroups();
}

/* ============ MONTHLY SCORING ============ */
let editState=null;
function vMonthly(){
 const el=document.getElementById("content");
 const g=window._mGroup||APPDATA.groups[0];
 const m=window._mMonth||latestMonth();
 el.innerHTML=`
 <div class="card">
  <h2>Chấm điểm hằng tháng — Group Leader</h2>
  <div class="note"><b>Cách chấm (đề xuất):</b> Mỗi tháng, Group Leader đánh giá từng thành viên trên <b>5 tiêu chí</b>, thang <b>0–100</b> (0 = chưa làm được, 100 = thành thạo như chuyên gia). Ô được điền sẵn từ tháng gần nhất — chỉ cần điều chỉnh phần thay đổi. Hệ thống tự tính Điểm tổng hợp, Level và xu hướng. Điểm được lưu trong trình duyệt của máy này.</div>
  <div class="row" style="margin-top:6px">
   <label class="small muted">Nhóm:</label>
   <select id="mgroup" onchange="mSel('g',this.value)">${APPDATA.groups.map(x=>`<option ${x===g?'selected':''}>${x}</option>`).join("")}</select>
   <label class="small muted">Tháng:</label>
   <select id="mmonth" onchange="mSel('m',this.value)">${monthList().map(x=>`<option value="${x}" ${x===m?'selected':''}>${x}${x===BASELINE?' (gốc)':''}</option>`).join("")}</select>
   <button class="ghost" onclick="newMonth()">➕ Thêm tháng mới</button>
   <span class="small muted" style="margin-left:auto">Leader: <b>${CONFIG.leaders[g]||"(chưa đặt)"}</b></span>
  </div>
 </div>
 <div class="card">
  <div class="row spread"><h2>${g} — ${m}</h2><span class="small muted">Nhập điểm 0–100 cho từng tiêu chí</span></div>
  <div style="overflow:auto"><table id="mtable"></table></div>
 </div>`;
 mTable(g,m);
}
function mSel(t,v){ if(dirtyMonth&&!confirm("Bỏ thay đổi chưa lưu?"))return; if(dirtyMonth)discardMonth();
 if(t==='g')window._mGroup=v;else window._mMonth=v;vMonthly();}
function mTable(g,m){
 const members=APPDATA.people.filter(p=>p.group===g);
 const prevMonths=monthList().filter(x=>x<m);const prev=prevMonths.slice(-1)[0];
 const t=document.getElementById("mtable");
 t.innerHTML=`<tr><th>Tên</th>${CATS.map(c=>`<th class="small">${c.short}<br><span class="muted" style="font-weight:400">0–100</span></th>`).join("")}<th>Tổng hợp</th><th>Level</th><th>So tháng trước</th><th class="small">Ghi chú</th></tr>`+
  members.map(p=>{
   const pct=getPct(m,p.name);const comp=composite(pct);const lv=levelOf(comp);
   const pcomp=prev?composite(getPct(prev,p.name)):null;
   let trend='<span class="muted small">—</span>';
   if(pcomp!==null){const d=comp-pcomp;trend=d>0.05?`<span class="up small">▲ +${fmt(d)}</span>`:d<-0.05?`<span class="down small">▼ ${fmt(d)}</span>`:'<span class="muted small">=</span>';}
   return `<tr id="mr_${cssId(p.name)}"><td>${p.name}</td>
    ${CATS.map(c=>{const _v=Math.round(pct[c.key]);return `<td><input type="number" min="0" max="100" value="${_v}" class="${_v===0?'zero':''}" data-p="${p.name}" data-c="${c.key}" oninput="mEdit(this)"></td>`;}).join("")}
    <td class="mcomp"><b>${fmt(comp)}</b></td><td class="mlvl">${lvlBadge(lv)}</td><td class="mtrend">${trend}</td>
    <td><input type="text" value="${getNote(m,p.name).replace(/"/g,'&quot;')}" data-note="${p.name}" oninput="mEditNote(this)" style="width:150px"></td></tr>`;
  }).join("");
 editState={group:g,month:m,data:{}};
 members.forEach(p=>{editState.data[p.name]={pct:{...getPct(m,p.name)},note:getNote(m,p.name)};});
}
function cssId(s){return s.replace(/[^a-zA-Z0-9]/g,"_");}
function mEdit(inp){
 const name=inp.dataset.p,cat=inp.dataset.c;let v=+inp.value;if(v<0)v=0;if(v>100)v=100;
 inp.classList.toggle("zero", v===0);
 editState.data[name].pct[cat]=v;markDirty();
 const comp=composite(editState.data[name].pct);const lv=levelOf(comp);
 const row=document.getElementById("mr_"+cssId(name));
 row.querySelector(".mcomp").innerHTML=`<b>${fmt(comp)}</b>`;
 row.querySelector(".mlvl").innerHTML=lvlBadge(lv);
 const prevMonths=monthList().filter(x=>x<editState.month);const prev=prevMonths.slice(-1)[0];
 if(prev){const d=comp-composite(getPct(prev,name));row.querySelector(".mtrend").innerHTML=d>0.05?`<span class="up small">▲ +${fmt(d)}</span>`:d<-0.05?`<span class="down small">▼ ${fmt(d)}</span>`:'<span class="muted small">=</span>';}
}
function mEditNote(inp){editState.data[inp.dataset.note].note=inp.value;markDirty();}
function markDirty(){dirtyMonth=editState.month;document.getElementById("savebar").classList.add("show");document.getElementById("saveinfo").textContent="Thay đổi chưa lưu — nhóm "+editState.group+", tháng "+editState.month;}
function saveMonth(){
 if(!editState)return;
 if(!MONTHS[editState.month])MONTHS[editState.month]={};
 Object.entries(editState.data).forEach(([n,v])=>{MONTHS[editState.month][n]={pct:{...v.pct},note:v.note};});
 save("qsl_months",MONTHS);dirtyMonth=null;document.getElementById("savebar").classList.remove("show");
 alert("Đã lưu điểm tháng "+editState.month+" cho nhóm "+editState.group);
}
function discardMonth(){dirtyMonth=null;document.getElementById("savebar").classList.remove("show");if(current==='monthly')vMonthly();}
function newMonth(){
 const d=new Date();const def=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
 const v=prompt("Nhập tháng mới (định dạng YYYY-MM):",def);
 if(!v)return;if(!/^\d{4}-\d{2}$/.test(v)){alert("Sai định dạng. Ví dụ: 2026-07");return;}
 if(MONTHS[v]){alert("Tháng này đã tồn tại.");window._mMonth=v;vMonthly();return;}
 const base=latestMonth();MONTHS[v]={};
 APPDATA.people.forEach(p=>{MONTHS[v][p.name]={pct:{...getPct(base,p.name)},note:""};});
 save("qsl_months",MONTHS);window._mMonth=v;vMonthly();
}

/* ============ SƠ ĐỒ TỔ CHỨC ============ */
// 4 Operating Leader → 7 nhóm (map theo sơ đồ). Có thể chỉnh tên/ngày/mô tả tại đây.
// Tên leader LẤY TỪ Group Leader của primaryGroup (đặt ở tab Nhóm). fallbackName chỉ dùng khi chưa đặt.
const ORG_LEADERS=[
 {fallbackName:"Lê Hữu Diêu", primaryGroup:"MT", role:"Giám sát MT Inspector · quản lý & kiểm soát thiết bị NDT · duy trì hồ sơ NDT.", groups:["MT"]},
 {fallbackName:"Võ Thế Trí", primaryGroup:"Case Depth & Hardness", role:"Giám sát CD, HN & MT inspector · quản lý thiết bị UT/HN/MT · ghi nhận kết quả kiểm.", groups:["Case Depth & Hardness"]},
 {fallbackName:"Đinh Ngọc Vương", primaryGroup:"CMM", role:"Giám sát Incoming/Assembly/CMM/Laser/Scan Arm · quản lý thiết bị & kiểm tra.", groups:["CMM","Incoming & DT test & CAV"]},
 {fallbackName:"Nguyễn Ngọc Hoàng", primaryGroup:"Coating", role:"Giám sát Coating & Packing inspector · quản lý thiết bị coating · ghi nhận kết quả.", groups:["Assembly","Coating","After Treatment Final & Packing"]},
];
function leaderName(L){return (CONFIG.leaders&&CONFIG.leaders[L.primaryGroup])||L.fallbackName;}
function escHtml(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function esc1(s){return String(s||"").replace(/'/g,"\\'");}
function photoOf(n){return (window.__PHOTOS||{})[n]||"";}
function certsOf(n){return (window.__CERTS||{})[n]||[];}
// Tên hiển thị (Full Name nếu có) — key nội bộ vẫn là n
function dispName(n){const p=personByName(n);return (p&&p.meta&&p.meta.fullName)?p.meta.fullName:n;}
function avatarHtml(name,size){
 const ph=photoOf(name);
 if(ph)return `<img src="${ph}" style="width:${size}px;height:${size}px;border-radius:8px;object-fit:cover;border:1px solid var(--line);flex:none">`;
 const parts=(name||"").trim().split(/\s+/);const init=(parts.slice(-1)[0]||"?").slice(0,2).toUpperCase();
 return `<div style="width:${size}px;height:${size}px;border-radius:8px;background:var(--panel2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--mut);font-size:${Math.round(size/3)}px;flex:none">${init}</div>`;
}
let orgMonthOverride=null;
function orgMonth(v){orgMonthOverride=v;vOrg();}
function orgCard(p,m){
 const comp=composite(getPct(m,p.name));const lv=levelOf(comp);const nc=certsOf(p.name).length;
 return `<div class="org-person" onclick="openPerson('${esc1(p.name)}')" title="Xem hồ sơ">
   ${avatarHtml(p.name,40)}
   <div style="flex:1;min-width:0"><div class="org-pname">${escHtml(dispName(p.name))}${nc?` <span title="${nc} chứng nhận">🎓</span>`:''}</div>
    <div class="org-pjoin">${p.meta&&p.meta.entered?('Vào: '+p.meta.entered):''}</div></div>
   <div>${lvlBadge(lv)}</div>
 </div>`;
}
function vOrg(){
 const el=document.getElementById("content");
 const m=orgMonthOverride||latestMonth();
 // 4 cột theo Operating Leader; MỖI nhóm chuyển vào cột của Group Leader được gán (khớp tên)
 const cols=ORG_LEADERS.map(L=>({L,name:leaderName(L),groups:[]}));
 const byName={}; cols.forEach(c=>{byName[c.name]=c;});
 APPDATA.groups.forEach(g=>{
  const assigned=(CONFIG.leaders&&CONFIG.leaders[g])||"";
  let col=(assigned&&byName[assigned]) || cols.find(c=>c.L.groups.includes(g)) || cols[0];
  col.groups.push(g);
 });
 const colsHtml=cols.map(col=>{
  const L=col.L, ln=col.name, lp=personByName(ln);
  const ljoin=(lp&&lp.meta&&lp.meta.entered)?lp.meta.entered:'-';
  const lbadge=lp?lvlBadge(levelOf(composite(getPct(m,ln)))):'';
  const groupsHtml=col.groups.map(g=>{
   const ppl=APPDATA.people.filter(p=>p.group===g && !isInactive(p.name))
     .map(p=>({p,comp:composite(getPct(m,p.name))})).sort((a,b)=>b.comp-a.comp);
   return `<div class="org-group"><div class="org-gtitle">${shortGroup(g)} <span class="pill">${ppl.length}</span></div>
     <div class="org-people">${ppl.map(({p})=>orgCard(p,m)).join("")||'<div class="muted small">— chưa có —</div>'}</div></div>`;
  }).join("");
  return `<div class="org-col">
    <div class="org-leader">${avatarHtml(ln,56)}
     <div class="org-lname">${escHtml(dispName(ln))}</div>
     <div class="org-lrole">Operating Leader</div>
     ${lbadge?`<div style="margin:2px 0 0">${lbadge}</div>`:''}
     <div class="org-ljoin">Vào: ${ljoin}</div>
     <div class="org-ldesc">${escHtml(L.role||'')}</div></div>
    ${groupsHtml||'<div class="org-group muted small">— chưa có nhóm —</div>'}</div>`;
 }).join("");
 el.innerHTML=`<div class="card"><div class="row spread">
   <div><h2>Sơ đồ tổ chức</h2><p class="muted small" style="margin:2px 0 0">4 Operating Leader · 7 nhóm · Level theo tháng chọn. Nhóm chuyển cột theo Group Leader. Nhấn 1 người để xem hồ sơ.</p></div>
   <div class="row"><span class="muted small">Level tháng:</span><select id="omonth" onchange="orgMonth(this.value)">${monthList().map(x=>`<option value="${x}" ${x===m?'selected':''}>${x}${x===BASELINE?' (gốc)':''}</option>`).join("")}</select></div></div>
   <div class="org-wrap">${colsHtml}</div></div>`;
}

/* ============ ẢNH & CHỨNG NHẬN ============ */
function onPhotoPick(name,input){
 const f=input.files&&input.files[0]; if(!f)return;
 const rd=new FileReader();
 rd.onload=e=>{const img=new Image();img.onload=()=>{
   const S=220;let w=img.width,h=img.height;const sc=Math.min(S/w,S/h,1);
   const cv=document.createElement("canvas");cv.width=Math.round(w*sc);cv.height=Math.round(h*sc);
   cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
   const durl=cv.toDataURL("image/jpeg",0.82);
   const P=window.__PHOTOS||{};P[name]=durl;window.__PHOTOS=P;save("qsl_photos",P);render();
 };img.src=e.target.result;};
 rd.readAsDataURL(f);
}
function removePhoto(name){const P=window.__PHOTOS||{};delete P[name];window.__PHOTOS=P;save("qsl_photos",P);render();}
function addCert(name){
 const title=(document.getElementById("ceTitle").value||"").trim();
 if(!title){alert("Nhập tên chứng nhận.");return;}
 const date=document.getElementById("ceDate").value||"";
 const note=(document.getElementById("ceNote").value||"").trim();
 const C=window.__CERTS||{};C[name]=[...(C[name]||[]),{title,date,note}];window.__CERTS=C;save("qsl_certs",C);render();
}
function delCert(name,i){const C=window.__CERTS||{};C[name]=(C[name]||[]).filter((_,j)=>j!==i);window.__CERTS=C;save("qsl_certs",C);render();}

// Thâm niên tính từ ngày vào làm → "X Years_Y Month"
function computeSeniority(entered){
 if(!entered) return "-";
 const d=new Date(entered); if(isNaN(d)) return "-";
 const now=new Date();
 let months=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
 if(now.getDate()<d.getDate()) months--;
 if(months<0) months=0;
 return Math.floor(months/12)+" Years_"+(months%12)+" Month";
}

}

function recommend(p,pct,comp,lv){
 const sorted=CATS.map(c=>({...c,v:+pct[c.key]||0})).sort((a,b)=>a.v-b.v);
 const tips=[];
 sorted.slice(0,2).forEach(c=>{
  if(c.v<40)tips.push(`Ưu tiên nâng <b>${c.vn}</b> (đang ${Math.round(c.v)}/100): sắp xếp đào tạo / OJT tập trung tiêu chí này.`);
  else if(c.v<65)tips.push(`Củng cố <b>${c.vn}</b> (${Math.round(c.v)}/100) để tiến lên mốc Level kế tiếp.`);
 });
 const bands=CONFIG.bands;const idx=bands.findIndex(b=>b.name===lv);
 if(idx>=0&&idx<bands.length-1){const next=bands[idx+1];tips.push(`Cần thêm <b>${fmt(next.min-comp)}</b> điểm tổng hợp để đạt <b>${next.name}</b>.`);}
 else tips.push(`Đã ở Level cao nhất — phù hợp vai trò kèm cặp / đào tạo người mới.`);
 return "<ul style='margin:6px 0;padding-left:18px'>"+tips.map(t=>`<li style='margin:5px 0'>${t}</li>`).join("")+"</ul>";
}
function certList(p){return `Công việc: ${p.meta.mainJob||"-"} • Thâm niên: ${p.meta.service||"-"} • Level cũ (hệ cũ): ${p.meta.oldFinalLevel||"-"}`;}
function detailTable(p){

  const items=p.scores[c.key];const appl=APPDATA.groupApplicable[p.group][c.key];

 });
 return h;
}

function wEdit(inp){CONFIG.weights[inp.dataset.w]=+inp.value||0;document.getElementById("wtot").textContent=CATS.reduce((s,c)=>s+(+CONFIG.weights[c.key]||0),0);}

function applyConfig(){save("qsl_config",CONFIG);renderCmp();alert("Đã áp dụng. Toàn bộ Level trong ứng dụng được tính lại theo cấu hình mới.");}
function resetConfig(){CONFIG.weights={...DEFAULT_WEIGHTS};CONFIG.bands=JSON.parse(JSON.stringify(DEFAULT_BANDS));save("qsl_config",CONFIG);vLevel();}
function renderCmp(){
 const rows=statRows(BASELINE).map(r=>{
  const oldRank=DEFAULT_BANDS.findIndex(b=>b.name===r.old);
  const newRank=DEFAULT_BANDS.findIndex(b=>b.name===r.level);
  return {...r,delta:(oldRank>=0&&newRank>=0)?newRank-oldRank:0};
 }).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta)||b.comp-a.comp);
 const t=document.getElementById("cmpTable");
 t.innerHTML=`<tr><th>Tên</th><th>Nhóm</th><th>Tổng hợp</th><th>Level cũ</th><th>→</th><th>Level mới</th><th>Thay đổi</th></tr>`+
  rows.map(r=>`<tr class="${Math.abs(r.delta)>=2?'hl':''}"><td>${r.name}</td><td class="small">${shortGroup(r.group)}</td>
   <td><b>${fmt(r.comp)}</b></td><td>${r.old?lvlBadge(r.old):'-'}</td><td class="muted">→</td><td>${lvlBadge(r.level)}</td>
   <td class="small ${r.delta>0?'up':r.delta<0?'down':'muted'}">${r.delta>0?'▲ +'+r.delta+' bậc':r.delta<0?'▼ '+r.delta+' bậc':'='}</td></tr>`).join("");
}

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const gate=document.getElementById('ieGate'), msg=document.getElementById('ieMsg'), err=document.getElementById('ieErr'), logout=document.getElementById('ieLogout');
let sb;
async function getSb(){ if(sb)return sb; const cfg=await (await fetch('/api/auth-config')).json(); sb=createClient(cfg.url,cfg.anonKey); return sb; }
async function hdr(){ const c=await getSb(); const {data:{session}}=await c.auth.getSession(); return session?{Authorization:'Bearer '+session.access_token}:null; }
function showErr(m){ err.textContent=m; err.style.display='block'; }
async function afterAuth(){
  err.style.display='none'; logout.style.display='none';
  const h=await hdr(); if(!h){ msg.textContent='Đăng nhập để tiếp tục'; return; }
  msg.textContent='Đang kiểm tra quyền…';
  const chk=await fetch('/api/inspector-eval?access=check',{headers:h});
  if(chk.status===401){ msg.textContent='Đăng nhập để tiếp tục'; return; }
  if(chk.status!==200){ showErr('Tài khoản chưa được cấp quyền vào Inspector Skill.'); logout.style.display='inline-block'; return; }
  const role=(await chk.json()).role;
  window.IE_ROLE=role;
  const isViewer = role==='viewer';
  msg.textContent='Đang tải dữ liệu…';
  const st=await (await fetch('/api/inspector-eval',{headers:h})).json();
  window.IE_REMOTE=st||{};
  window.IE_persist = isViewer
    ? async()=>{}   // viewer không ghi
    : async(k,v)=>{ try{ const hh=await hdr(); const r=await fetch('/api/inspector-eval',{method:'POST',headers:{...hh,'Content-Type':'application/json'},body:JSON.stringify({k,v})}); if(!r.ok)console.error('persist',r.status);}catch(e){ console.error('persist',e); } };
  // Viewer: khoá chỉnh sửa toàn giao diện
  if(isViewer) document.body.classList.add('ie-viewer');
  // Badge quyền + nút đăng xuất
  document.getElementById('ieRoleBadge').textContent = isViewer ? '👁 Chỉ xem' : ('✎ ' + role);
  const tr=document.getElementById('ieTopRight'); tr.style.display='flex';
  gate.style.display='none';
  window.bootApp();
}
document.getElementById('ieForm').addEventListener('submit', async(e)=>{
  e.preventDefault(); err.style.display='none'; msg.textContent='Đang đăng nhập…';
  try{
    const c=await getSb();
    const {error}=await c.auth.signInWithPassword({email:document.getElementById('ieEmail').value.trim(),password:document.getElementById('iePass').value});
    if(error){ showErr('Sai email hoặc mật khẩu.'); msg.textContent='Đăng nhập để tiếp tục'; return; }
    await afterAuth();
  }catch(e){ showErr('Lỗi: '+(e.message||e)); msg.textContent='Đăng nhập để tiếp tục'; }
});
async function doLogout(){ const c=await getSb(); await c.auth.signOut(); location.reload(); }
logout.addEventListener('click', doLogout);
document.getElementById('ieLogout2').addEventListener('click', doLogout);
afterAuth();  // tự vào nếu đã đăng nhập sẵn ở hub (dùng chung phiên Supabase)
</script>
</body>
</html>
